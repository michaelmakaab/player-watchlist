name: Weekly Sweep

on:
  schedule:
    # Every Monday and Thursday at 08:00 UTC
    - cron: "0 8 * * 1,4"

  # Manual trigger
  workflow_dispatch:
    inputs:
      player_name:
        description: "Search a specific player (optional)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sweep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run sweep
        timeout-minutes: 15
        env:
          ANTHROPIC_API_KEY: ${{ secrets.TT }}
        run: |
          PLAYER="${{ github.event.inputs.player_name }}"
          if [ -n "$PLAYER" ]; then
            echo "Running sweep for player: $PLAYER"
            node scripts/sweep.mjs --verbose --player "$PLAYER"
          else
            echo "Running full weekly sweep..."
            node scripts/sweep.mjs --verbose
          fi

      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet data/ dist/ index.html; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat data/ dist/ index.html
          fi

      - name: Create sweep branch and PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%b %-d, %Y")
          BRANCH="sweep/weekly-$(date -u +%Y%m%d-%H%M)"

          git config user.name "Sweep Bot"
          git config user.email "sweep-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/ dist/ index.html sweeps/
          git commit -m "sweep: $DATE — weekly intel update"
          git push -u origin "$BRANCH"

          # Count new intel
          SWEEP_FILE=$(ls -t sweeps/sweep_*.json 2>/dev/null | head -1)
          NEW_COUNT=0
          REVIEW_COUNT=0
          if [ -n "$SWEEP_FILE" ]; then
            NEW_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('$SWEEP_FILE','utf-8')); console.log((d.newIntel||[]).length)" 2>/dev/null || echo 0)
            REVIEW_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('$SWEEP_FILE','utf-8')); console.log((d.needsReview||[]).length)" 2>/dev/null || echo 0)
          fi

          gh pr create \
            --title "Sweep: $DATE" \
            --body "$(cat <<EOF
          ## Weekly Sweep Report

          **Date:** $DATE
          **New intel items:** $NEW_COUNT
          **Needs review:** $REVIEW_COUNT

          *Auto-generated by Sweep Bot*
          EOF
          )" \
            --base main \
            --head "$BRANCH"

      - name: Auto-merge sweep PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Auto-merging sweep PR..."
          sleep 10
          gh pr merge --squash --delete-branch

      - name: Upload sweep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-report-${{ github.run_number }}
          path: sweeps/
          retention-days: 90
