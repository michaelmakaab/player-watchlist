name: Remove Player

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  remove:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'player-removal')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            function parseField(body, fieldName) {
              const regex = new RegExp(`### ${fieldName}\\s*\\n\\s*\\n([^\\n]+)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const playerId = parseField(body, 'Player ID');
            const playerName = parseField(body, 'Player Name');

            if (!playerId) {
              core.setFailed('Player ID is required');
              return;
            }

            core.setOutput('player_id', playerId);
            core.setOutput('player_name', playerName);

      - name: Remove player from data
        id: remove
        run: |
          PLAYER_ID="${{ steps.parse.outputs.player_id }}"
          PLAYER_NAME="${{ steps.parse.outputs.player_name }}"

          node -e "
            const fs = require('fs');
            const id = parseInt('$PLAYER_ID');

            const playersData = JSON.parse(fs.readFileSync('data/players.json', 'utf-8'));
            const before = playersData.players.length;
            playersData.players = playersData.players.filter(p => p.id !== id);
            const after = playersData.players.length;

            if (before === after) {
              console.log('Player ID ' + id + ' not found — nothing to remove');
              process.exit(1);
            }

            playersData.meta.playerCount = playersData.players.length;
            fs.writeFileSync('data/players.json', JSON.stringify(playersData, null, 2) + '\n');

            const intelData = JSON.parse(fs.readFileSync('data/intel.json', 'utf-8'));
            delete intelData[String(id)];
            fs.writeFileSync('data/intel.json', JSON.stringify(intelData, null, 2) + '\n');

            console.log('Removed player: $PLAYER_NAME (ID ' + id + ')');
          "

          bash build.sh

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAYER_NAME="${{ steps.parse.outputs.player_name }}"
          PLAYER_SLUG=$(echo "$PLAYER_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')
          BRANCH="remove/${PLAYER_SLUG}-$(date +%s)"
          ISSUE_NUM=${{ github.event.issue.number }}

          git config user.name "Player Watchlist Bot"
          git config user.email "bot@player-watchlist.github.io"

          git checkout -b "$BRANCH"
          git add data/players.json data/intel.json dist/index.html index.html
          git commit -m "remove: ${PLAYER_NAME} (#${ISSUE_NUM})"
          git push origin "$BRANCH"

          gh pr create \
            --title "Remove ${PLAYER_NAME} from watchlist" \
            --body "Player removed via issue #${ISSUE_NUM}." \
            --base main \
            --head "$BRANCH"

          sleep 10
          gh pr merge --squash --delete-branch

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## Player Removed\n\n**${{ steps.parse.outputs.player_name }}** has been removed from the watchlist. The site will update within a few minutes.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              labels: ['player-removed']
            });
